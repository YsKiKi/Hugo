<script>
    (function () {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function applySystemTheme(e) {
            if (!localStorage.getItem("pref-theme")) {
                document.documentElement.dataset.theme = e.matches ? 'dark' : 'light';
            }
        }
        if (mq.addEventListener) {
            mq.addEventListener('change', applySystemTheme);
        } else if (mq.addListener) {
            
            mq.addListener(applySystemTheme);
        }
    })();
</script>

<script>
(function () {
  
  var copyBtn = document.getElementById('cn-copy-link');
  if (copyBtn) {
    copyBtn.addEventListener('click', function () {
      var url = copyBtn.getAttribute('data-url');
      navigator.clipboard.writeText(url).then(function () {
        var name = copyBtn.querySelector('.cn-share-name');
        if (name) {
          var orig = name.textContent;
          name.textContent = '已复制！';
          setTimeout(function () { name.textContent = orig; }, 1800);
        }
      }).catch(function () {
        prompt('复制下方链接：', url);
      });
    });
  }

  
  var wcBtn   = document.getElementById('cn-wechat-btn');
  var wcModal = document.getElementById('cn-wechat-modal');
  var wcClose = document.getElementById('cn-wechat-close');
  var wcUrlEl = document.getElementById('cn-wechat-url');
  var qrEl    = document.getElementById('cn-qrcode');

  if (!wcBtn || !wcModal) return;

  wcBtn.addEventListener('click', function () {
    var url = wcBtn.getAttribute('data-url');
    wcUrlEl.textContent = url;
    qrEl.innerHTML = '';

    var img = document.createElement('img');
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(url);
    img.alt = '页面二维码';
    img.width = 180;
    img.height = 180;
    qrEl.appendChild(img);

    wcModal.removeAttribute('hidden');
    wcClose.focus();
  });

  wcClose.addEventListener('click', function () {
    wcModal.setAttribute('hidden', '');
  });

  wcModal.addEventListener('click', function (e) {
    if (e.target === wcModal) wcModal.setAttribute('hidden', '');
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !wcModal.hasAttribute('hidden')) {
      wcModal.setAttribute('hidden', '');
    }
  });
})();
</script>

<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
